<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit</title>
    <style>
body {
    text-align: center;
    background: linear-gradient(135deg, #1e272e, #485460);
    font-family: 'Poppins', sans-serif;
    color: white;
}

h1 {
    margin-top: 40px;
    font-size: 3rem;
    letter-spacing: 2px;
}

.set {
    margin-top: 60px;
}

.drum {
    width: 100px;
    height: 100px;
    margin: 15px;
    font-size: 2rem;
    font-weight: bold;
    border-radius: 15px;
    border: none;
    cursor: pointer;
    color: white;
    background: linear-gradient(145deg, #ff6b81, #ff4757);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    transition: all 0.2s ease;
}

.drum:hover {
    transform: scale(1.1);
}

.pressed {
    transform: scale(0.95);
    box-shadow: 0 5px 10px rgba(0,0,0,0.6);
    background: #ff9ff3;
}

footer {
    margin-top: 50px;
    opacity: 0.7;
}
</style>
</head>
<body>

    <h1>Drum Kit 🎵</h1>

    <div class="set">
        <button class="drum w">w</button>
        <button class="drum a">a</button>
        <button class="drum s">s</button>
        <button class="drum d">d</button>
        <button class="drum j">j</button>
        <button class="drum k">k</button>
        <button class="drum l">l</button>
    </div>

    <!-- Link to your JavaScript -->
    <script>
        let numberOfButtons = document.querySelectorAll(".drum").length;
        console.log(numberOfButtons);

        for(let i = 0; i<numberOfButtons; i++){
            document.querySelectorAll(".drum")[i].addEventListener("click", function(){
                let key = this.innerText;
                makeSound(key);
                buttonAnimation(key);
            });
        }

        function makeSound(key){
            switch(key){
                case 'w':
                    let tom1 = new Audio("./sounds/drum_stick/sounds/edr-synth-cowbell-high-169970.mp3");
                    tom1.play();
                    break;
                case 'a':
                    let tom2 = new Audio("./sounds/drum_stick/sounds/freesound_community-071645_drumloopbreakskit010wav-88065.mp3");
                    tom2.play();
                    break;
                case 's':
                    let tom3 = new Audio("./sounds/drum_stick/sounds/freesound_community-korg-kaossilator-pro-zap-drum-kit-perc-synth-28575.mp3");
                    tom3.play();
                    break;
                case 'd':
                    let tom4 = new Audio("./sounds/drum_stick/sounds/fronbondi_skegs-drum-rock-style-drumbreak-01-145bpm-3bars-462984.mp3");
                    tom4.play();
                    break;
                case 'j':
                    let snare = new Audio("./sounds/drum_stick/sounds/prettysleepy-coconut-grove-bongo-drum-kit-solo-by-prettysleepy-art-13825.mp3");
                    snare.play();
                    break;
                case 'k':
                    let crash = new Audio("./sounds/drum_stick/sounds/prettysleepy-dubstep-drum-solo-140bpm-by-prettysleepy-art-15454.mp3");
                    crash.play();
                    break;
                case 'l':
                    let kick = new Audio("./sounds/drum_stick/sounds/soundreality-beat-of-time-128705.mp3");
                    kick.play();
                    break;
            }
        }

        document.addEventListener("keypress", function(event){
            makeSound(event.key);
            buttonAnimation(event.key);
        });

        function buttonAnimation(currentKey) {
            var activeButton = document.querySelector("." + currentKey);
            if(activeButton){  // safety check
                activeButton.classList.add("pressed");
                setTimeout(function() {
                    activeButton.classList.remove("pressed");
                }, 100);
            }
        }
    </script>

</body>
</html>
