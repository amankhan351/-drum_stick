<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit</title>
    <style>
        body {
            text-align: center;
            background: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-top: 50px;
            font-size: 3rem;
            color: #333;
        }

        .set {
            margin-top: 50px;
        }

        .drum {
            width: 100px;
            height: 100px;
            margin: 10px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            outline: none;
            cursor: pointer;
            background: #ff4757;
            color: white;
            box-shadow: 0 5px #e84118;
            transition: all 0.1s;
        }

        .drum:active {
            box-shadow: 0 2px #e84118;
            transform: translateY(3px);
        }

        .pressed {
            box-shadow: 0 2px #e84118;
            transform: translateY(3px);
            background: #ff6b81;
        }

        @media(max-width: 600px){
            .drum{
                width: 70px;
                height: 70px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <h1>Drum Kit 🎵</h1>

    <div class="set">
        <button class="drum w">w</button>
        <button class="drum a">a</button>
        <button class="drum s">s</button>
        <button class="drum d">d</button>
        <button class="drum j">j</button>
        <button class="drum k">k</button>
        <button class="drum l">l</button>
    </div>

    <!-- Link to your JavaScript -->
    <script>
        let numberOfButtons = document.querySelectorAll(".drum").length;
        console.log(numberOfButtons);

        for(let i = 0; i<numberOfButtons; i++){
            document.querySelectorAll(".drum")[i].addEventListener("click", function(){
                let key = this.innerText;
                makeSound(key);
                buttonAnimation(key);
            });
        }

        function makeSound(key){
            switch(key){
                case 'w':
                    let tom1 = new Audio("./sounds/tom-1.mp3");
                    tom1.play();
                    break;
                case 'a':
                    let tom2 = new Audio("./sounds/tom-2.mp3");
                    tom2.play();
                    break;
                case 's':
                    let tom3 = new Audio("./sounds/tom-3.mp3");
                    tom3.play();
                    break;
                case 'd':
                    let tom4 = new Audio("./sounds/tom-4.mp3");
                    tom4.play();
                    break;
                case 'j':
                    let snare = new Audio("./sounds/snare.mp3");
                    snare.play();
                    break;
                case 'k':
                    let crash = new Audio("./sounds/crash.mp3");
                    crash.play();
                    break;
                case 'l':
                    let kick = new Audio("./sounds/kick-bass.mp3");
                    kick.play();
                    break;
            }
        }

        document.addEventListener("keypress", function(event){
            makeSound(event.key);
            buttonAnimation(event.key);
        });

        function buttonAnimation(currentKey) {
            var activeButton = document.querySelector("." + currentKey);
            if(activeButton){  // safety check
                activeButton.classList.add("pressed");
                setTimeout(function() {
                    activeButton.classList.remove("pressed");
                }, 100);
            }
        }
    </script>

</body>
</html>
